function parseCSV(csvText, tabName) {
  const lines = csvText.trim().split('\n').filter(l => l.trim());
  if (lines.length < 2) return [];

  // Parse header row to find column positions by name
  const headers = splitCSVLine(lines[0]).map(h => h.replace(/^"|"$/g,'').trim().toLowerCase());
  const col = (name) => headers.indexOf(name);

  const titleIdx   = col('title');
  const bodyIdx    = col('body_text');
  const imageIdx   = col('image_url');
  const tagsIdx    = col('tags');

  // If no title column found at all, fall back to position 0
  const getTitleIdx = titleIdx >= 0 ? titleIdx : 0;

  const items = [];
  for (let i = 1; i < lines.length; i++) {
    const cols  = splitCSVLine(lines[i]);
    const clean = (idx) => idx >= 0 && cols[idx] ? cols[idx].replace(/^"|"$/g,'').trim() : '';
    const title = clean(getTitleIdx);
    if (!title) continue;
    items.push({
      id:       `${tabName}__${i}`,
      category: tabName,
      title,
      body:     clean(bodyIdx),
      imageUrl: clean(imageIdx),
      tags:     clean(tagsIdx),
    });
  }
  console.log(`Tab "${tabName}": ${items.length} items loaded`);
  return items;
}

function splitCSVLine(line) {
  const result = [];
  let cur = '', inQ = false;
  for (let i = 0; i < line.length; i++) {
    const c = line[i];
    if (c === '"') {
      if (inQ && line[i+1] === '"') { cur += '"'; i++; }
      else inQ = !inQ;
    } else if (c === ',' && !inQ) {
      result.push(cur); cur = '';
    } else {
      cur += c;
    }
  }
  result.push(cur);
  return result;
}
