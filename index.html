<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="ClinicalEDGE">
<meta name="theme-color" content="#0a0f1e">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="manifest" href="manifest.json">
<title>ClinicalEDGE</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/fuse.js/7.0.0/fuse.min.js"></script>
<style>
:root {
  --bg:#0a0f1e;--bg3:#1a2235;--bg4:#1f2d45;
  --purple:#7c3aed;--purple2:#9d5cf6;--purple3:#c084fc;
  --purple-dim:rgba(124,58,237,0.15);--purple-glow:rgba(124,58,237,0.25);
  --white:#ffffff;--white2:#f0eaff;--white3:#c4b5fd;
  --muted:#8b7aa8;--border:rgba(124,58,237,0.25);--border2:rgba(124,58,237,0.45);
  --radius:16px;--radius-sm:10px;--font:'DM Sans',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{background:var(--bg);color:var(--white);font-family:var(--font);min-height:100vh;overflow-x:hidden}
.screen{display:none;flex-direction:column;min-height:100vh;animation:fadeIn 0.3s ease}
.screen.active{display:flex}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
@keyframes floatUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:none}}

/* ══ SPLASH ══ */
#screen-splash{
  background:radial-gradient(ellipse at 50% 25%,#3d0090 0%,#180035 45%,#0a0f1e 100%);
  align-items:center;justify-content:center;
  padding:48px 32px;text-align:center;
  position:relative;overflow:hidden;
}
.orb{position:absolute;border-radius:50%;filter:blur(80px);pointer-events:none}
.orb1{width:360px;height:360px;background:rgba(124,58,237,0.3);top:-100px;right:-100px}
.orb2{width:240px;height:240px;background:rgba(157,92,246,0.2);bottom:-60px;left:-80px}
.splash-content{position:relative;z-index:1;display:flex;flex-direction:column;align-items:center}
.splash-logo{font-size:46px;font-weight:600;letter-spacing:-1.5px;color:var(--white);line-height:1;animation:floatUp 0.6s ease both}
.splash-logo span{color:var(--purple3)}
.splash-org{margin-top:12px;font-size:12px;font-weight:400;color:var(--white3);letter-spacing:0.5px;line-height:1.7;animation:floatUp 0.6s 0.1s ease both}
.splash-line{width:48px;height:1px;background:var(--border2);margin:32px auto;animation:floatUp 0.6s 0.2s ease both}
.splash-tagline{font-size:15px;color:var(--muted);margin-bottom:40px;animation:floatUp 0.6s 0.25s ease both}
.splash-greeting{display:none;flex-direction:column;align-items:center;margin-bottom:40px;gap:6px;animation:floatUp 0.6s 0.2s ease both}
.splash-greeting.show{display:flex}
.splash-hello{font-size:15px;color:var(--muted)}
.splash-name{font-size:32px;font-weight:500;color:var(--white);letter-spacing:-0.5px}
.splash-tap{font-size:14px;color:var(--white3);margin-top:4px}
.btn-splash{
  animation:floatUp 0.6s 0.3s ease both;
  background:linear-gradient(135deg,var(--purple) 0%,var(--purple2) 100%);
  color:var(--white);border:none;border-radius:50px;
  padding:15px 52px;font-family:var(--font);font-size:16px;font-weight:500;
  cursor:pointer;letter-spacing:0.3px;
  box-shadow:0 0 40px rgba(124,58,237,0.4);
  transition:transform 0.15s,opacity 0.15s,box-shadow 0.2s;
}
.btn-splash:hover{opacity:0.92;transform:translateY(-2px);box-shadow:0 6px 48px rgba(124,58,237,0.5)}
.btn-splash:active{transform:scale(0.97)}
.btn-splash:disabled{opacity:0.5;cursor:not-allowed}

/* ══ REGISTER ══ */
#screen-register{
  background:radial-gradient(ellipse at 50% 0%,#3b0080 0%,#160030 45%,#0a0f1e 100%);
  align-items:center;justify-content:center;padding:32px 24px;
}
.reg-top{text-align:center;margin-bottom:24px}
.reg-logo{font-size:26px;font-weight:600;letter-spacing:-0.5px;color:var(--white)}
.reg-logo span{color:var(--purple3)}
.reg-org{font-size:11px;color:var(--white3);margin-top:6px;font-weight:300;letter-spacing:0.2px;line-height:1.7}
.reg-card{width:100%;max-width:400px;background:rgba(255,255,255,0.04);border:1px solid var(--border2);border-radius:var(--radius);padding:28px 24px;backdrop-filter:blur(20px)}
.reg-card h2{font-size:17px;font-weight:500;color:var(--white);margin-bottom:20px;text-align:center}
.field{margin-bottom:14px}
.field label{display:block;font-size:12px;color:var(--white3);margin-bottom:5px;font-weight:500;letter-spacing:0.3px}
.field input{width:100%;background:rgba(255,255,255,0.06);border:1px solid var(--border);border-radius:var(--radius-sm);padding:11px 14px;color:var(--white);font-family:var(--font);font-size:14px;outline:none;transition:border 0.2s}
.field input::placeholder{color:var(--muted)}
.field input:focus{border-color:var(--purple2);background:rgba(124,58,237,0.08)}
.btn-primary{width:100%;margin-top:8px;background:linear-gradient(135deg,var(--purple) 0%,var(--purple2) 100%);color:var(--white);border:none;border-radius:var(--radius-sm);padding:13px;font-family:var(--font);font-size:15px;font-weight:500;cursor:pointer;transition:opacity 0.2s,transform 0.1s}
.btn-primary:hover{opacity:0.9}
.btn-primary:active{transform:scale(0.98)}
.btn-primary:disabled{opacity:0.5;cursor:not-allowed}
.reg-error{display:none;margin-top:12px;padding:10px 14px;background:rgba(239,68,68,0.12);border:1px solid rgba(239,68,68,0.3);border-radius:var(--radius-sm);font-size:13px;color:#fca5a5;text-align:center}

/* ══ TOPBAR ══ */
.topbar{position:sticky;top:0;z-index:50;background:rgba(10,15,30,0.92);backdrop-filter:blur(16px);border-bottom:1px solid var(--border);padding:0 16px;display:flex;align-items:center;min-height:56px;gap:12px}
.topbar-logo{font-size:20px;font-weight:600;color:var(--white);flex:1;letter-spacing:-0.3px}
.topbar-logo span{color:var(--purple3)}
.back-btn{display:flex;align-items:center;gap:4px;background:none;border:none;color:var(--purple3);font-family:var(--font);font-size:14px;font-weight:500;cursor:pointer;padding:6px 0;flex-shrink:0}
.back-btn svg{width:18px;height:18px}
.topbar-title{font-size:16px;font-weight:500;color:var(--white);flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

/* ══ HOME ══ */
#screen-home{background:var(--bg)}
.home-body{flex:1;padding:16px}
.search-wrap{position:relative;margin-bottom:20px}
.search-wrap svg{position:absolute;left:12px;top:50%;transform:translateY(-50%);width:18px;height:18px;color:var(--muted);pointer-events:none}
#search-input{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:50px;padding:11px 16px 11px 40px;color:var(--white);font-family:var(--font);font-size:14px;outline:none;transition:border 0.2s}
#search-input::placeholder{color:var(--muted)}
#search-input:focus{border-color:var(--purple2)}
#search-results{display:none}
#search-results.visible{display:block}
.search-result-item{display:flex;align-items:center;gap:12px;padding:12px 14px;background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius-sm);margin-bottom:8px;cursor:pointer;transition:border-color 0.15s,background 0.15s}
.search-result-item:hover{border-color:var(--purple);background:var(--purple-dim)}
.search-result-cat{font-size:10px;font-weight:600;color:var(--purple3);background:var(--purple-dim);border-radius:4px;padding:2px 7px;white-space:nowrap;flex-shrink:0}
.search-result-title{font-size:14px;color:var(--white);flex:1}
.search-empty{text-align:center;padding:32px 0;color:var(--muted);font-size:14px}
.tiles-label{font-size:12px;color:var(--muted);font-weight:500;letter-spacing:0.5px;margin-bottom:12px}
#tiles-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}
.tile{aspect-ratio:1;background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius);display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;padding:16px;transition:border-color 0.2s,background 0.2s,transform 0.15s;text-align:center;position:relative;overflow:hidden}
.tile::before{content:'';position:absolute;inset:0;background:radial-gradient(circle at 50% 0%,var(--purple-glow) 0%,transparent 70%);opacity:0;transition:opacity 0.2s}
.tile:hover::before,.tile:active::before{opacity:1}
.tile:hover{border-color:var(--purple2);transform:translateY(-2px)}
.tile:active{transform:scale(0.97)}
.tile-icon{width:48px;height:48px;background:var(--purple-dim);border:1px solid var(--border2);border-radius:12px;display:flex;align-items:center;justify-content:center;margin-bottom:12px;font-size:22px}
.tile-name{font-size:14px;font-weight:500;color:var(--white);line-height:1.3}
.tile-count{font-size:11px;color:var(--muted);margin-top:4px}
.status-msg{text-align:center;padding:32px 16px;color:var(--muted);font-size:14px;line-height:1.8}
.status-icon{font-size:32px;margin-bottom:12px}
.status-title{font-size:16px;font-weight:500;color:var(--white3);margin-bottom:8px}
.status-msg code{background:var(--bg3);border:1px solid var(--border);border-radius:6px;padding:2px 8px;font-size:12px;color:var(--purple3);font-family:monospace}

/* ══ CATEGORY LIST ══ */
#screen-category{background:var(--bg)}
.cat-body{flex:1;padding:16px}
.content-list-item{display:flex;align-items:center;gap:12px;padding:14px 16px;background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius-sm);margin-bottom:8px;cursor:pointer;transition:border-color 0.15s,background 0.15s}
.content-list-item:hover{border-color:var(--purple);background:var(--purple-dim)}
.content-list-num{font-size:12px;color:var(--muted);min-width:24px}
.content-list-title{font-size:14px;color:var(--white);flex:1;line-height:1.4}
.content-list-arrow{color:var(--muted);font-size:18px;flex-shrink:0}

/* ══ CONTENT PAGE ══ */
#screen-content{background:var(--bg)}
.content-body{flex:1;padding:16px;padding-bottom:40px}
.content-title-h{font-size:20px;font-weight:600;color:var(--white);margin-bottom:16px;line-height:1.3}

/* Main image */
.content-img-wrap{width:100%;border-radius:var(--radius);overflow:hidden;border:1px solid var(--border);background:var(--bg3);margin-bottom:16px;min-height:180px;display:flex;align-items:center;justify-content:center}
.content-img-wrap img{width:100%;height:auto;display:block}
.img-placeholder{color:var(--muted);font-size:13px;padding:32px;text-align:center;line-height:1.6}

/* Explain button */
.btn-explain{width:100%;background:var(--purple-dim);border:1px solid var(--border2);border-radius:var(--radius-sm);padding:13px;color:var(--purple3);font-family:var(--font);font-size:14px;font-weight:500;cursor:pointer;transition:background 0.2s,border-color 0.2s;display:flex;align-items:center;justify-content:center;gap:8px}
.btn-explain:hover{background:rgba(124,58,237,0.25);border-color:var(--purple2)}

/* Explanation box */
.explanation-box{display:none;margin-top:14px;animation:fadeIn 0.2s ease}
.explanation-box.visible{display:block}
.explanation-text{background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius-sm);padding:16px;font-size:14px;color:var(--white2);line-height:1.8;white-space:pre-wrap;margin-bottom:12px}
.explanation-text:empty{display:none}

/* Explanation images — stacked */
.explanation-images{display:flex;flex-direction:column;gap:12px}
.explanation-img-wrap{width:100%;border-radius:var(--radius-sm);overflow:hidden;border:1px solid var(--border);background:var(--bg3);display:flex;align-items:center;justify-content:center;min-height:120px}
.explanation-img-wrap img{width:100%;height:auto;display:block}

/* ══ LOADING ══ */
#loading-overlay{position:fixed;inset:0;z-index:999;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;transition:opacity 0.4s}
#loading-overlay.hidden{display:none}
.loading-logo{font-size:28px;font-weight:600;color:var(--white);letter-spacing:-0.5px}
.loading-logo span{color:var(--purple3)}
.loading-spinner{width:36px;height:36px;border:2px solid var(--border);border-top-color:var(--purple2);border-radius:50%;animation:spin 0.8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-sub{font-size:13px;color:var(--muted)}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--bg4);border-radius:4px}
</style>
</head>
<body>

<div id="loading-overlay">
  <div class="loading-logo">Clinical<span>EDGE</span></div>
  <div class="loading-spinner"></div>
  <div class="loading-sub" id="loading-sub">Starting up…</div>
</div>

<!-- ══ SCREEN 1: SPLASH ══ -->
<div class="screen" id="screen-splash">
  <div class="orb orb1"></div>
  <div class="orb orb2"></div>
  <div class="splash-content">
    <div class="splash-logo">Clinical<span>EDGE</span></div>
    <div class="splash-org">
      Academic Division of St Vincent Hospital<br>IM Residency Program
    </div>
    <div class="splash-line"></div>

    <!-- First-time users -->
    <div class="splash-tagline" id="splash-tagline">Your clinical reference, simplified.</div>

    <!-- Returning users -->
    <div class="splash-greeting" id="splash-greeting">
      <div class="splash-hello">Hello,</div>
      <div class="splash-name" id="splash-name"></div>
      <div class="splash-tap">Tap below to enter</div>
    </div>

    <button class="btn-splash" id="splash-btn" onclick="handleSplashEnter()">Enter</button>
  </div>
</div>

<!-- ══ SCREEN 2: REGISTER ══ -->
<div class="screen" id="screen-register">
  <div class="reg-top">
    <div class="reg-logo">Clinical<span>EDGE</span></div>
    <div class="reg-org">Academic Division of St Vincent Hospital<br>IM Residency Program</div>
  </div>
  <div class="reg-card">
    <h2>Create your account</h2>
    <div class="field"><label>FIRST NAME</label><input type="text" id="reg-firstname" placeholder="e.g. Sarah" autocomplete="given-name"></div>
    <div class="field"><label>LAST NAME</label><input type="text" id="reg-lastname" placeholder="e.g. Johnson" autocomplete="family-name"></div>
    <div class="field"><label>EMAIL ADDRESS</label><input type="email" id="reg-email" placeholder="your@email.com" autocomplete="email"></div>
    <div class="field"><label>INSTITUTION CODE</label><input type="text" id="reg-code" placeholder="Enter code provided by administrator" autocomplete="off" style="letter-spacing:2px"></div>
    <button class="btn-primary" id="reg-btn" onclick="handleRegister()">Register &amp; Enter</button>
    <div class="reg-error" id="reg-error"></div>
  </div>
</div>

<!-- ══ SCREEN 3: HOME ══ -->
<div class="screen" id="screen-home">
  <div class="topbar">
    <div class="topbar-logo">Clinical<span>EDGE</span></div>
  </div>
  <div class="home-body">
    <div class="search-wrap">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-4.35-4.35M17 11A6 6 0 1 1 5 11a6 6 0 0 1 12 0z"/></svg>
      <input type="search" id="search-input" placeholder="Search all content…" oninput="handleSearch(this.value)" autocomplete="off">
    </div>
    <div id="search-results"></div>
    <div id="tiles-section">
      <div class="tiles-label">CATEGORIES</div>
      <div id="tiles-grid"></div>
    </div>
  </div>
</div>

<!-- ══ SCREEN 4: CATEGORY LIST ══ -->
<div class="screen" id="screen-category">
  <div class="topbar">
    <button class="back-btn" onclick="showScreen('screen-home')">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg>Back
    </button>
    <div class="topbar-title" id="cat-screen-title"></div>
  </div>
  <div class="cat-body"><div id="content-list"></div></div>
</div>

<!-- ══ SCREEN 5: CONTENT PAGE ══ -->
<div class="screen" id="screen-content">
  <div class="topbar">
    <button class="back-btn" onclick="goBackFromContent()">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg>Back
    </button>
    <div class="topbar-title" id="content-screen-title"></div>
  </div>
  <div class="content-body">
    <div class="content-title-h" id="content-title"></div>
    <div class="content-img-wrap" id="content-img-wrap"></div>
    <button class="btn-explain" id="explain-btn" onclick="toggleExplanation()">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" style="width:16px;height:16px"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M12 2a10 10 0 1 1 0 20A10 10 0 0 1 12 2z"/></svg>
      <span id="explain-btn-text">Show explanation</span>
    </button>
    <div class="explanation-box" id="explanation-box">
      <div class="explanation-text" id="explanation-text"></div>
      <div class="explanation-images" id="explanation-images"></div>
    </div>
  </div>
</div>


</body>
</html>
<script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js').catch(() => {});
  });
}
</script>
